sonar.projectKey=EnzoTurpin_MyTripCircle
sonar.organization=enzoturpin

# Exclure les fichiers i18n et les données statiques de la détection de duplication.
# Les fichiers de traduction partagent la même structure de clés par conception (une par langue),
# et les fiches de destination ont un schéma commun intentionnel.
sonar.cpd.exclusions=src/utils/i18n/**,src/data/**

# Couverture de tests : rapport LCOV généré par `npm run test:coverage`
# (et uploadé par la CI — voir .github/workflows/ci.yml).
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Fichiers exclus de la mesure de couverture (tests, données statiques,
# traductions, bootstrap serveur, dossiers natifs/générés).
sonar.coverage.exclusions=**/__tests__/**,src/data/**,src/utils/i18n/**,server/index.js,server/db.js,ios/**,android/**,coverage/**

# Tests : aide Sonar à distinguer code applicatif et code de test.
sonar.tests=src,server
sonar.test.inclusions=**/__tests__/**/*.test.ts,**/__tests__/**/*.test.tsx,**/__tests__/**/*.test.js
